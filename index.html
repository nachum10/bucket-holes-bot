<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>חורים בדלי - אבחון עסקי</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;900&display=swap');

:root {
  --neon-blue: #00d4ff;
  --neon-purple: #a855f7;
  --neon-pink: #f472b6;
  --neon-green: #34d399;
  --neon-orange: #fb923c;
  --glass-bg: rgba(15, 23, 42, 0.6);
  --glass-border: rgba(255, 255, 255, 0.08);
  --dark-bg: #0a0e1a;
  --card-bg: rgba(15, 23, 42, 0.85);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Heebo', sans-serif;
  background: var(--dark-bg);
  color: #e2e8f0;
  min-height: 100vh;
  overflow-x: hidden;
  direction: rtl;
}

#particles-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;
}

.bg-gradient {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(168, 85, 247, 0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(244, 114, 182, 0.08) 0%, transparent 50%);
  animation: gradientShift 15s ease infinite;
}

@keyframes gradientShift {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

.app-container {
  position: relative;
  z-index: 1;
  max-width: 800px;
  margin: 0 auto;
  padding: 20px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.header {
  text-align: center;
  padding: 30px 20px 20px;
}

.header h1 {
  font-size: 2.2rem;
  font-weight: 900;
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple), var(--neon-pink));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 20px rgba(0, 212, 255, 0.3));
}

.header .subtitle {
  color: rgba(255, 255, 255, 0.5);
  font-size: 0.95rem;
  font-weight: 300;
  margin-top: 4px;
}

.progress-container {
  margin: 15px 0 25px;
}

.progress-bar-bg {
  height: 4px;
  background: rgba(255, 255, 255, 0.08);
  border-radius: 4px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
  border-radius: 4px;
  transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
  box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
}

.progress-text {
  text-align: center;
  font-size: 0.75rem;
  color: rgba(255, 255, 255, 0.35);
  margin-top: 8px;
}

.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 10px 0;
  scroll-behavior: smooth;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-track { background: transparent; }
.chat-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

.message {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  animation: messageSlideIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  opacity: 0;
}

@keyframes messageSlideIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.message.bot { flex-direction: row; }
.message.user { flex-direction: row-reverse; }

.avatar {
  width: 42px;
  height: 42px;
  border-radius: 14px;

  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  flex-shrink: 0;
}

.bot .avatar {

  border: 1px solid rgba(0, 212, 255, 0.3);
  box-shadow: 0 0 15px rgba(0, 212, 255, 0.15);
}

.user .avatar {
  background: linear-gradient(135deg, rgba(244, 114, 182, 0.2), rgba(251, 146, 60, 0.2));
  border: 1px solid rgba(244, 114, 182, 0.3);

.bubble {
  max-width: 75%;
  padding: 14px 18px;
  border-radius: 18px;

.bot .bubble {
  background: var(--card-bg);
  border: 1px solid var(--glass-border);
  border-radius: 18px 18px 4px 18px;
  backdrop-filter: blur(12px);
}

.user .bubble {
  background: linear-gradient(135deg, rgba(168, 85, 247, 0.25), rgba(0, 212, 255, 0.15));

.typing-indicator span {

}

.result-title {

.result-track {

.result-body {

.score-bars {

.score-row {

.score-label {

.score-track-bar {

.score-fill {

.score-val {

.cta-btn {
  display: block;
  width: 100%;
  padding: 16px;
  margin-top: 25px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
  color: white;
  font-family: 'Heebo', sans-serif;
  font-size: 1.05rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 0 25px rgba(0, 212, 255, 0.25);

.cta-btn:hover {

  display: block;
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border: 1px solid var(--glass-border);

  background: transparent;
  color: rgba(255, 255, 255, 0.5);
  font-family: 'Heebo', sans-serif;

.hidden { display: none !important; }

@media (max-width: 600px) {

  .options-container { padding: 5px 10px; }

  .welcome-icon { width: 90px; height: 90px; font-size: 2.5rem; }
  .welcome-screen h2 { font-size: 1.4rem; }
  .result-card { padding: 20px; }
  .avatar { width: 36px; height: 36px; }
}
</style>

<script>
// ===== PARTICLES =====
(function initParticles() {
  const canvas = document.getElementById('particles-canvas');
  const ctx = canvas.getContext('2d');
  const particles = [];
  const PARTICLE_COUNT = 60;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  class Particle {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random() * canvas.width;
      this.y = Math.random() * canvas.height;
      this.vx = (Math.random() - 0.5) * 0.3;
      this.vy = (Math.random() - 0.5) * 0.3;
      this.radius = Math.random() * 2 + 0.5;
      this.opacity = Math.random() * 0.3 + 0.05;
      const colors = ['0, 212, 255', '168, 85, 247', '244, 114, 182'];
      this.color = colors[Math.floor(Math.random() * colors.length)];
    }
    update() {
      this.x += this.vx;
      this.y += this.vy;
      if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
      if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
    }
    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(' + this.color + ', ' + this.opacity + ')';
      ctx.fill();
    }
  }

  for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());

  function connectParticles() {
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 150) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = 'rgba(0, 212, 255, ' + (0.03 * (1 - dist / 150)) + ')';
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(function(p) { p.update(); p.draw(); });
    connectParticles();
    requestAnimationFrame(animate);
  }
  animate();
})();

// ===== DOM HELPERS (no innerHTML) =====
function createEl(tag, className, textContent) {
  var el = document.createElement(tag);
  if (className) el.className = className;
  if (textContent) el.textContent = textContent;
  return el;
}

function delay(ms) {
  return new Promise(function(r) { setTimeout(r, ms); });
}

function scrollToBottom() {
  setTimeout(function() {
    chatArea.scrollTop = chatArea.scrollHeight;
  }, 100);
}

function updateProgress() {
  var pct = Math.round((state.answeredCount / state.totalQuestions) * 100);
  progressFill.style.width = pct + '%';
  progressText.textContent = '\u05E9\u05D0\u05DC\u05D4 ' + state.answeredCount + ' \u05DE\u05EA\u05D5\u05DA ' + state.totalQuestions;
}

function addBotMessage(text, useHTML) {
  // Create typing indicator first
  var typingMsg = createEl('div', 'message bot');
  var typingAvatar = createEl('div', 'avatar');
  typingAvatar.textContent = String.fromCodePoint(0x1F916);
  var typingBubble = createEl('div', 'bubble');
  var typingDots = createEl('div', 'typing-indicator');
  for (var i = 0; i < 3; i++) typingDots.appendChild(createEl('span'));
  typingBubble.appendChild(typingDots);
  typingMsg.appendChild(typingAvatar);
  typingMsg.appendChild(typingBubble);
  chatArea.appendChild(typingMsg);
  scrollToBottom();

  return delay(800 + Math.random() * 600).then(function() {
    // Replace typing with actual message
    typingBubble.textContent = '';
    if (useHTML) {
      // Only used for the track result where we need bold - content is fully controlled
      var span = document.createElement('span');
      span.textContent = text.replace(/<[^>]+>/g, '');
      // Find the bold part and make it bold
      typingBubble.textContent = '';
      var parts = text.split(/<strong>|<\/strong>/);
      for (var j = 0; j < parts.length; j++) {
        if (j % 2 === 1) {
          var bold = createEl('strong');
          bold.textContent = parts[j];
          typingBubble.appendChild(bold);
        } else {
          typingBubble.appendChild(document.createTextNode(parts[j]));
        }
      }
    } else {
      typingBubble.textContent = text;
    }
    scrollToBottom();
  });
}

function addUserMessage(text) {
  var msg = createEl('div', 'message user');
  var avatar = createEl('div', 'avatar');
  avatar.textContent = String.fromCodePoint(0x1F464);
  var bubble = createEl('div', 'bubble');
  bubble.textContent = text;
  msg.appendChild(avatar);
  msg.appendChild(bubble);
  chatArea.appendChild(msg);
  scrollToBottom();
}

function showOptions(question) {
  return new Promise(function(resolve) {
    var container = createEl('div', 'options-container');

    question.options.forEach(function(opt, idx) {
      var btn = createEl('button', 'option-btn');
      btn.style.animationDelay = (idx * 0.08) + 's';

      var letterSpan = createEl('span', 'option-letter', opt.letter);
      var textSpan = createEl('span', null, opt.text);

      btn.appendChild(letterSpan);
      btn.appendChild(textSpan);

      btn.addEventListener('click', function() {
        var allBtns = container.querySelectorAll('.option-btn');
        for (var i = 0; i < allBtns.length; i++) {
          allBtns[i].style.pointerEvents = 'none';
          allBtns[i].style.opacity = '0.4';
        }
        btn.style.opacity = '1';
        btn.classList.add('selected');

        setTimeout(function() {
          container.style.transition = 'opacity 0.3s, transform 0.3s';
          container.style.opacity = '0';
          container.style.transform = 'translateY(-10px)';
          setTimeout(function() {
            container.remove();
            resolve(opt);
          }, 300);
        }, 400);
      });

      container.appendChild(btn);
    });

    chatArea.appendChild(container);
    scrollToBottom();
  });
}

// ===== RESULTS =====
function showResults() {
  var track = state.currentTrack;
  var trackName = TRACK_NAMES[track];
  var trackIcon = TRACK_ICONS[track];
  var ending = TRACK_ENDINGS[track];
  var maxPossible = 4;

  var scoreEntries = [
    { key: 'leads', label: '\u05DC\u05D9\u05D3\u05D9\u05DD', cls: 'leads' },
    { key: 'sales', label: '\u05DE\u05DB\u05D9\u05E8\u05D5\u05EA', cls: 'sales' },
    { key: 'operations', label: '\u05EA\u05E4\u05E2\u05D5\u05DC', cls: 'operations' },
    { key: 'money', label: '\u05DB\u05E1\u05E3', cls: 'money' }
  ];

  var resultCard = createEl('div', 'result-card');

  // Header
  var header = createEl('div', 'result-header');
  header.appendChild(createEl('div', 'result-icon', trackIcon));
  header.appendChild(createEl('div', 'result-title', '\u05D4\u05D0\u05D1\u05D7\u05D5\u05DF \u05E9\u05DC\u05DA \u05DE\u05D5\u05DB\u05DF!'));
  header.appendChild(createEl('div', 'result-track', '\u05DE\u05E1\u05DC\u05D5\u05DC: ' + trackName));
  resultCard.appendChild(header);

  // Score bars
  var barsContainer = createEl('div', 'score-bars');
  scoreEntries.forEach(function(s) {
    var row = createEl('div', 'score-row');
    row.appendChild(createEl('span', 'score-label', s.label));
    var trackBar = createEl('div', 'score-track-bar');
    var fill = createEl('div', 'score-fill ' + s.cls);
    fill.dataset.width = String((state.scores[s.key] / maxPossible) * 100);
    trackBar.appendChild(fill);
    row.appendChild(trackBar);
    row.appendChild(createEl('span', 'score-val', state.scores[s.key] + '/' + maxPossible));
    barsContainer.appendChild(row);
  });
  resultCard.appendChild(barsContainer);

  // Body text
  var body = createEl('div', 'result-body');
  var paragraphs = ending.split('\n\n');
  paragraphs.forEach(function(p, i) {
    if (i > 0) body.appendChild(document.createElement('br'));
    body.appendChild(document.createTextNode(p));
    if (i < paragraphs.length - 1) body.appendChild(document.createElement('br'));
  });
  resultCard.appendChild(body);

  // CTA button
  var ctaBtn = createEl('button', 'cta-btn', String.fromCodePoint(0x1F4DE) + ' \u05DC\u05E7\u05D1\u05D9\u05E2\u05EA \u05E9\u05D9\u05D7\u05EA \u05D9\u05D9\u05E2\u05D5\u05E5 \u05DE\u05EA\u05E0\u05D4');
  ctaBtn.addEventListener('click', function() { alert('\u05DB\u05D0\u05DF \u05EA\u05D5\u05DB\u05DC\u05D9 \u05DC\u05E7\u05D1\u05D5\u05E2 \u05E9\u05D9\u05D7\u05EA \u05D9\u05D9\u05E2\u05D5\u05E5 \u05DE\u05EA\u05E0\u05D4!'); });
  resultCard.appendChild(ctaBtn);

  // Restart button
  var restartBtn = createEl('button', 'restart-btn', String.fromCodePoint(0x1F504) + ' \u05E8\u05D5\u05E6\u05D4 \u05DC\u05E2\u05E9\u05D5\u05EA \u05D0\u05EA \u05D4\u05E9\u05D0\u05DC\u05D5\u05DF \u05E9\u05D5\u05D1?');
  restartBtn.addEventListener('click', function() { location.reload(); });
  resultCard.appendChild(restartBtn);

  chatArea.appendChild(resultCard);
  scrollToBottom();

  // Animate score bars
  setTimeout(function() {
    var fills = resultCard.querySelectorAll('.score-fill');
    for (var i = 0; i < fills.length; i++) {
      fills[i].style.width = fills[i].dataset.width + '%';
    }
  }, 500);

  // Update progress to complete
  progressFill.style.width = '100%';
  progressText.textContent = '\u05D4\u05D0\u05D1\u05D7\u05D5\u05DF \u05D4\u05D5\u05E9\u05DC\u05DD! \u2705';
}

  updateProgress();

  var empathyResponses = [
    '\u05D4\u05D1\u05E0\u05EA\u05D9, \u05EA\u05D5\u05D3\u05D4 \u05E2\u05DC \u05D4\u05DB\u05E0\u05D5\u05EA! ' + String.fromCodePoint(0x1F64F),
    '\u05DE\u05E2\u05D5\u05DC\u05D4, \u05DE\u05DE\u05E9\u05D9\u05DB\u05D5\u05EA! ' + String.fromCodePoint(0x2728),
    '\u05EA\u05D5\u05D3\u05D4! \u05D0\u05E0\u05D9 \u05DB\u05D1\u05E8 \u05E8\u05D5\u05D0\u05D4 \u05EA\u05DE\u05D5\u05E0\u05D4 \u05DE\u05EA\u05D7\u05D9\u05DC\u05D4 \u05DC\u05D4\u05EA\u05D2\u05D1\u05E9...',
    '\u05D0\u05D7\u05DC\u05D4, \u05E2\u05D5\u05D3 \u05E7\u05E6\u05EA \u05D5\u05D9\u05E9 \u05DC\u05E0\u05D5 \u05EA\u05DE\u05D5\u05E0\u05D4 \u05DE\u05DC\u05D0\u05D4! ' + String.fromCodePoint(0x1F4A1)
  ];

  var openingKeys = ['q1', 'q2', 'q3', 'q4'];

  addBotMessage('\u05D4\u05D9\u05D9! ' + String.fromCodePoint(0x1F44B) + ' \u05D0\u05E0\u05D9 \u05DB\u05D0\u05DF \u05DB\u05D3\u05D9 \u05DC\u05E2\u05D6\u05D5\u05E8 \u05DC\u05DA \u05DC\u05D6\u05D4\u05D5\u05EA \u05D0\u05D9\u05E4\u05D4 \u05D1\u05D3\u05D9\u05D5\u05E7 \u05D4\u05E2\u05E1\u05E7 \u05E9\u05DC\u05DA "\u05D3\u05D5\u05DC\u05E3".')
  .then(function() { return delay(400); })
  .then(function() { return addBotMessage('\u05D0\u05E0\u05D9 \u05D0\u05E9\u05D0\u05DC \u05D0\u05D5\u05EA\u05DA \u05DB\u05DE\u05D4 \u05E9\u05D0\u05DC\u05D5\u05EA \u05E7\u05E6\u05E8\u05D5\u05EA \u2014 \u05D0\u05D9\u05DF \u05EA\u05E9\u05D5\u05D1\u05D5\u05EA \u05E0\u05DB\u05D5\u05E0\u05D5\u05EA \u05D0\u05D5 \u05DC\u05D0 \u05E0\u05DB\u05D5\u05E0\u05D5\u05EA. \u05E4\u05E9\u05D5\u05D8 \u05EA\u05D1\u05D7\u05E8\u05D9 \u05D0\u05EA \u05DE\u05D4 \u05E9\u05D4\u05DB\u05D9 \u05DE\u05EA\u05D0\u05E8 \u05D0\u05EA \u05D4\u05DE\u05E6\u05D1 \u05D0\u05E6\u05DC\u05DA \u05D4\u05D9\u05D5\u05DD.'); })
  .then(function() { return delay(400); })
  .then(function() { return addBotMessage('\u05DE\u05D5\u05DB\u05E0\u05D4? \u05D1\u05D5\u05D0\u05D9 \u05E0\u05EA\u05D7\u05D9\u05DC! ' + String.fromCodePoint(0x1F680)); })
  .then(function() { return delay(600); })
  .then(function() {
    // Process opening questions sequentially
    var questionIndex = 0;

    function processNextQuestion() {
      if (questionIndex >= openingKeys.length) {
        return determineTrack();
      }
      var qKey = openingKeys[questionIndex];
      var question = QUESTIONS[qKey];

      return addBotMessage(question.text)
        .then(function() { return showOptions(question); })
        .then(function(answer) {
          addUserMessage(answer.text);
          state.scores[question.track] = answer.score;
          state.answeredCount++;
          updateProgress();
          return delay(300);
        })
        .then(function() {
          return addBotMessage(empathyResponses[questionIndex]);
        })
        .then(function() {
          return delay(300);
        })
        .then(function() {
          questionIndex++;
          return processNextQuestion();
        });
    }

    return processNextQuestion();
  });
}

function determineTrack() {
  var scores = state.scores;
  var maxScore = Math.max(scores.leads, scores.sales, scores.operations, scores.money);
  var topTracks = Object.keys(scores).filter(function(t) { return scores[t] === maxScore; });

  if (topTracks.length > 1) {
    // Tiebreaker needed
    return addBotMessage('\u05DE\u05E2\u05E0\u05D9\u05D9\u05DF... \u05D9\u05E9 \u05DB\u05DE\u05D4 \u05EA\u05D7\u05D5\u05DE\u05D9\u05DD \u05E9\u05D3\u05D5\u05E8\u05E9\u05D9\u05DD \u05EA\u05E9\u05D5\u05DE\u05EA \u05DC\u05D1. \u05D1\u05D5\u05D0\u05D9 \u05E0\u05D3\u05D9\u05D9\u05E7:')
      .then(function() { return delay(300); })
      .then(function() {
        var tbQuestion = QUESTIONS.tiebreaker;
        return addBotMessage(tbQuestion.text)
          .then(function() { return showOptions(tbQuestion); })
          .then(function(tbAnswer) {
            addUserMessage(tbAnswer.text);
            state.currentTrack = tbAnswer.track;
            state.answeredCount++;
            state.totalQuestions = 7;
            updateProgress();
            return delay(300);
          });
      })
      .then(function() { return goToTrack(); });
  } else {
    state.currentTrack = topTracks[0];
    return goToTrack();
  }
}

function goToTrack() {
  var trackName = TRACK_NAMES[state.currentTrack];
  var trackIcon = TRACK_ICONS[state.currentTrack];
  var msgParts = [trackIcon + ' \u05E0\u05E8\u05D0\u05D4 \u05E9\u05D4\u05D0\u05D6\u05D5\u05E8 \u05E9\u05D3\u05D5\u05E8\u05E9 \u05D4\u05DB\u05D9 \u05D4\u05E8\u05D1\u05D4 \u05EA\u05E9\u05D5\u05DE\u05EA \u05DC\u05D1 \u05D0\u05E6\u05DC\u05DA \u05D4\u05D5\u05D0 <strong>' + trackName + '</strong>. \u05D1\u05D5\u05D0\u05D9 \u05E0\u05E6\u05DC\u05D5\u05DC \u05E7\u05E6\u05EA \u05D9\u05D5\u05EA\u05E8 \u05DC\u05E2\u05D5\u05DE\u05E7...'];

  return addBotMessage(msgParts[0], true)
    .then(function() { return delay(500); })
    .then(function() {
      // Track Q5
      var q5Key = state.currentTrack + '_q5';
      var q5 = QUESTIONS[q5Key];
      return addBotMessage(q5.text)
        .then(function() { return showOptions(q5); })
        .then(function(a5) {
          addUserMessage(a5.text);
          state.answeredCount++;
          state.totalQuestions = Math.max(state.totalQuestions, state.answeredCount + 1);
          updateProgress();
          return delay(300).then(function() {
            return addBotMessage('\u05DE\u05E6\u05D5\u05D9\u05DF, \u05DE\u05DE\u05E7\u05D3\u05EA! ' + String.fromCodePoint(0x1F3AF));
          }).then(function() {
            return delay(400);
          }).then(function() {
            // Track Q6
            var q6Key = a5.next || (state.currentTrack + '_q6a');
            var q6 = QUESTIONS[q6Key];
            return addBotMessage(q6.text)
              .then(function() { return showOptions(q6); })
              .then(function(a6) {
                addUserMessage(a6.text);
                state.answeredCount++;
                state.totalQuestions = state.answeredCount;
                updateProgress();
                return delay(400);
              });
          });
        });
    })
    .then(function() {
      return addBotMessage('\u05EA\u05D5\u05D3\u05D4 \u05E8\u05D1\u05D4! ' + String.fromCodePoint(0x1F31F) + ' \u05E2\u05DB\u05E9\u05D9\u05D5 \u05D9\u05E9 \u05DC\u05D9 \u05EA\u05DE\u05D5\u05E0\u05D4 \u05D1\u05E8\u05D5\u05E8\u05D4. \u05EA\u05E0\u05D9 \u05DC\u05D9 \u05E8\u05D2\u05E2 \u05DC\u05E0\u05EA\u05D7 \u05D0\u05EA \u05D4\u05E0\u05EA\u05D5\u05E0\u05D9\u05DD...');
    })
    .then(function() { return delay(1500); })
    .then(function() { showResults(); });
}

// ===== START =====
document.getElementById('startBtn').addEventListener('click', startQuiz);
</script>
